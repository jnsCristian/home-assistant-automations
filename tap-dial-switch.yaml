  button_2_has_light: "{{ button_2_light.entity_id | default([]) | length > 0 or button_2_light.device_id | default([]) | length > 0 or button_2_light.area_id | default([]) | length > 0 or button_2_light.label_id | default([]) | length > 0 }}"

blueprint:
  name: Philips Hue Tap Dial Switch 


  description: |
    # Philips Hue Tap Dial Switch 
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input:
    zha:
      name: Zigbee Home Automation (ZHA)
      description: Configure ZHA integration settings.
      icon: mdi:zigbee
      collapsed: true
      input:
        zha_remote:
          name: Remote Device (ZHA)
          description: |
            `optional` `device`

            Select the Philips Hue Tap Dial Switch device from ZHA. Leave empty if not using ZHA.
          default: {}
          selector:
            device:
              entity:
                - domain:
                    - sensor
                  device_class:
                    - battery
              filter:
                - integration: zha
                  manufacturer: Signify Netherlands B.V.
                  model: RDM002
              multiple: false
    integration_type:
      name: Integration Type
      description: |
        `required`

        Select which integration(s) to use for the Philips Hue Tap Dial Switch. You can select Z2M, ZHA, or both.
      default: []
      selector:
        select:
          options:
            - label: Zigbee Home Automation (ZHA)
              value: zha
          multiple: true              
    button_1_custom:
      name: Button 1 - Custom Actions
      icon: mdi:numeric-1-circle-outline
      collapsed: true
      input:
        button_1_press:
          name: Short Press
          description: |
            `optional` `action` `ZHA`

            Action to run on a short press of Button 1.
          default: []
          selector:
            action: {}

        button_1_hold:
          name: Long Press
          description: |
            `optional` `action` `Z2M` `ZHA`

            Action to run on a long press of Button 1. Will repeat while the button is held.
          default: []
          selector:
            action: {}
        button_1_double:
          name: Double Press
          description: |
            `optional` `action` `Z2M` `ZHA`

            Action to run on a double press of Button 1.
          default: []
          selector:
            action: {}
        button_1_triple:
          name: Triple Press
          description: |
            `optional` `action` `ZHA`

            Action to run on a triple press of Button 1.
          default: []
          selector:
            action: {}
        button_1_quadruple:
          name: Quadruple Press
          description: |
            `optional` `action` `ZHA`

            Action to run on a quadruple press of Button 1.
          default: []
          selector:
            action: {}
        button_1_quintuple:
          name: Quintuple Press
          description: |
            `optional` `action` `ZHA`

            Action to run on a quintuple press of Button 1.
          default: []
          selector:
            action: {}
        button_1_rotate_left:
          name: Rotate Left
          description: |
            `optional` `action` `Z2M` `ZHA`

            Action to run when dial is turned to the left after pressing Button 1.
          default: []
          selector:
            action: {}
        button_1_rotate_right:
          name: Rotate Right
          description: |
            `optional` `action` `Z2M` `ZHA`

            Action to run when dial is turned to the right after pressing Button 1.
          default: []
          selector:
            action: {}

    button_2_custom:
      name: Button 2 - Custom Actions
      icon: mdi:numeric-2-circle-outline
      collapsed: true
      input:
        button_2_press:
          name: Short Press
          description: |
            `optional` `action` `ZHA`

            Action to run on a short press of Button 2.
          default: []
          selector:
            action: {}
        button_2_short_release:

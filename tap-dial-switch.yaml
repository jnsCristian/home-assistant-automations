blueprint:
  name: Philips Hue Tap Dial Switch 


  description: |
    # Philips Hue Tap Dial Switch 
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input:
    button_1_custom:
      name: Button 1 - Custom Actions
      icon: mdi:numeric-1-circle-outline
      collapsed: true
      input:
        button_1_press:
          name: Short Press
          description: |
            `optional` `action` `ZHA`

            Action to run on a short press of Button 1.
          default: []
          selector:
            action: {}




mode: single
max_exceeded: silent



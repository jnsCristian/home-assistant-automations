blueprint:
  name: Media Player
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  input: 
    media_player:
      name: Media Player
      icon: mdi:television
      collapsed: true
      input:
        media_player_remote:
          name: Media Player
          default: {}
          selector:
            entity:
              multiple: false
              filter:
                - device_class: tv
    adaptive_lighting_helper:
      name: Adaptive lighting input helper
      selector:
        entity:
          filter:
            - domain:
                - input_boolean
          multiple: false
    sunset:
      name: Active only after sunset and before sunrise
      selector:
        boolean: 
    adaptive_lighting:
      name: Active only if adaptive lighting is enabled
      selector:
        boolean:
    media_sources:
      name: Media Sources
      selector:
        select:
          options:
            - label: Jellyfin
              value: Jellyfin
            - label: YouTube
              value: YouTube
            - label: Twitch
              value: Twitch
          multiple: true
    gaming_sources:
      name: Gaming Sources
      selector:
        select:
          options:
            - label: PS5 Game Console
              value: PS5 Game Console
          multiple: true
    music_sources:
      name: Gaming Sources
      selector:
        select:
          options:
            - label: Spotify - Music and Podcasts
              value: Spotify - Music and Podcasts
          multiple: true
    on_off_inputs:
      icon: mdi:power
      name: On/Off
      collapsed: true
      input:
        on_input:
          name: Turn On
          default: []
          selector:
            action: {}
        off_input:
          name: Turn Off
          default: []
          selector:
            action: {}     
    play_pause_inputs:
      icon: mdi:play-pause
      name: Play/Pause
      collapsed: true
      input:
        play_input:
          name: Play
          default: []
          selector:
            action: {}
        pause_input:
          name: Pause
          default: []
          selector:
            action: {}
    source_inputs:
      name: Source
      collapsed: true
      icon: mdi:television
      input:
        media_sources_input:
          name: Media
          default: []
          selector:
            action: {}
        gaming_sources_input:
          name: Gaming
          default: []
          selector:
            action: {}
        music_sources_input:
          name: Music
          default: []
          selector:
            action: {}
                      
mode: single
max_exceeded: silent


variables:
   media_player_remote: !input media_player_remote
   event: "{{ trigger.id }}"

triggers:
  - trigger: state
    entity_id: !input media_player_remote
    id: turn_on_trigger
    from: "off"
    to: "on"
  - trigger: state
    entity_id: !input media_player_remote
    id: turn_on_trigger
    from: "unavailable"
    to: "on"
  - trigger: state
    entity_id: !input media_player_remote
    id: turn_off_trigger
    to: "off"
  - trigger: state
    entity_id: !input media_player_remote
    id: turn_off_trigger
    to: "unavailable"
    
  - trigger: state
    entity_id: !input media_player_remote
    id: playing_trigger
    to: "playing"
  - trigger: state
    entity_id: !input media_player_remote
    id: paused_trigger
    from: "playing"
    to: "paused"
    
  - trigger: state
    entity_id: !input media_player_remote
    attribute: source
    id: YouTube
    to: "YouTube"
  - trigger: state
    entity_id: !input media_player_remote
    attribute: source
    id: Jellyfin
    to: "Jellyfin"
  - trigger: state
    entity_id: !input media_player_remote
    attribute: source
    id: Twitch
    to: "Twitch"
  - trigger: state
    entity_id: !input media_player_remote
    attribute: source
    id: PS5 Game Console
    to: "PS5 Game Console"
  - trigger: state
    entity_id: !input media_player_remote
    attribute: source
    id: Spotify - Music and Podcasts
    to: "Spotify - Music and Podcasts"

conditions:
  - condition: sun
    before: sunrise
    after: sunset
    enabled: !input sunset
  - condition: state
    entity_id: !input adaptive_lighting_helper
    state:
      - "on"
    enabled: !input adaptive_lighting

actions:
  - choose:
      - conditions: "{{ event == 'turn_on_trigger' }}"
        sequence: !input on_input
      - conditions: "{{ event in 'turn_off_trigger' }}"
        sequence: !input off_input
        
      - conditions: "{{ event == 'playing_trigger' }}"
        sequence: !input play_input
      - conditions: "{{ event in 'paused_trigger' }}"
        sequence: !input pause_input
        
      - conditions: "{{ event in media_sources }}"
        sequence: !input media_sources_input
      - conditions: "{{ event in gaming_sources }}"
        sequence: !input gaming_sources_input
      - conditions: "{{ event in music_sources }}"
        sequence: !input music_sources_input
